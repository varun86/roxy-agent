  <title>Roxy sweeping</title>
  <defs>
    <style>
      .body { transform-origin: 16px 16px; animation: sweep-body .85s infinite ease-in-out; }
      .shadow { transform-origin: 16px 28px; animation: sweep-shadow .85s infinite ease-in-out; }
      .broom { transform-origin: 18px 23px; animation: broom-swing .85s infinite ease-in-out; }
      .dust { animation: dust .85s infinite ease-out; }
      .d2 { animation-delay:.22s; }
      @keyframes sweep-body { 0%,100% { transform: translateX(0); } 50% { transform: translateX(-.8px); } }
      @keyframes sweep-shadow { 0%,100% { transform: scaleX(1); opacity:.22; } 50% { transform: scaleX(1.08); opacity:.27; } }
      @keyframes broom-swing { 0% { transform: rotate(-18deg); } 50% { transform: rotate(8deg); } 100% { transform: rotate(-18deg); } }
      @keyframes dust { 0% { opacity:0; transform: translateX(0); } 40% { opacity:.85; } 100% { opacity:0; transform: translateX(4px); } }
    </style>
